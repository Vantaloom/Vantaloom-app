<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Vantaloom</title>
    <style>
      :root {
        --ink: #0b0d14;
        --graphite: #161a26;
        --ash: #8b93a7;
        --canvas: #f3f5fb;
        --teal: #3ad0c8;
        --violet: #8b7bf0;
        --pink: #ff5da2;
        --danger: #ff6b6b;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", system-ui, sans-serif;
        color: var(--canvas);
        background:
          radial-gradient(120% 90% at 50% -10%, rgba(139, 123, 240, 0.22), transparent 60%),
          radial-gradient(90% 70% at 90% 110%, rgba(58, 208, 200, 0.16), transparent 55%),
          var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-user-select: none;
        user-select: none;
        overflow: hidden;
      }
      .card {
        width: min(440px, 86vw);
        text-align: center;
        padding: 8px 16px;
      }
      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 22px;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--teal), var(--violet));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        font-weight: 700;
        color: var(--ink);
        box-shadow: 0 10px 40px rgba(139, 123, 240, 0.35);
      }
      h1 {
        font-size: 22px;
        font-weight: 650;
        letter-spacing: 0.5px;
        margin: 0 0 6px;
      }
      .status {
        min-height: 22px;
        font-size: 14px;
        color: var(--ash);
        margin: 0 0 22px;
        transition: color 0.2s;
      }
      .bar {
        height: 6px;
        width: 100%;
        border-radius: 99px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .bar > i {
        display: block;
        height: 100%;
        width: 0%;
        border-radius: 99px;
        background: linear-gradient(90deg, var(--teal), var(--violet));
        transition: width 0.35s ease;
      }
      .bar.indeterminate > i {
        width: 35% !important;
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide {
        0% { margin-left: -35%; }
        100% { margin-left: 100%; }
      }
      .pct {
        font-variant-numeric: tabular-nums;
        font-size: 12px;
        color: var(--ash);
        margin-top: 10px;
        height: 16px;
      }
      .actions {
        margin-top: 18px;
        display: none;
        gap: 10px;
        justify-content: center;
      }
      .actions.show { display: flex; }
      button {
        font: inherit;
        font-size: 13px;
        padding: 9px 18px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        color: var(--canvas);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      button:hover { background: rgba(255, 255, 255, 0.12); }
      button.primary {
        background: linear-gradient(135deg, var(--teal), var(--violet));
        color: var(--ink);
        border-color: transparent;
        font-weight: 600;
      }
      .error {
        display: none;
        margin: 0 0 14px;
        font-size: 13px;
        color: var(--danger);
        line-height: 1.5;
        word-break: break-word;
      }
      .error.show { display: block; }
      .log-toggle {
        margin-top: 22px;
        font-size: 11px;
        color: var(--ash);
        opacity: 0.6;
        cursor: pointer;
      }
      .log-toggle:hover { opacity: 1; }
      pre.log {
        display: none;
        text-align: left;
        max-height: 150px;
        overflow: auto;
        margin: 12px 0 0;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.35);
        color: var(--ash);
        font-size: 11px;
        line-height: 1.6;
        white-space: pre-wrap;
      }
      pre.log.show { display: block; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo">V</div>
      <h1>Vantaloom</h1>
      <p class="status" id="status">正在启动…</p>

      <p class="error" id="error"></p>

      <div class="bar" id="bar"><i id="barFill"></i></div>
      <div class="pct" id="pct"></div>

      <div class="actions" id="actions">
        <button class="primary" id="retry">重试</button>
        <button id="browser">在浏览器中打开</button>
      </div>

      <div class="log-toggle" id="logToggle">显示详细日志</div>
      <pre class="log" id="log"></pre>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const statusEl = $("status");
      const errorEl = $("error");
      const bar = $("bar");
      const barFill = $("barFill");
      const pct = $("pct");
      const actions = $("actions");
      const logEl = $("log");

      let targetURL = "";

      function setStatus(msg) { statusEl.textContent = msg || ""; }
      function setProgress(p) {
        if (typeof p === "number" && p >= 0) {
          bar.classList.remove("indeterminate");
          barFill.style.width = Math.min(100, Math.max(0, p)) + "%";
          pct.textContent = p > 0 ? p + "%" : "";
        } else {
          bar.classList.add("indeterminate");
          pct.textContent = "";
        }
      }
      function appendLog(phase, msg) {
        const ts = new Date().toLocaleTimeString();
        logEl.textContent += `[${ts}] ${phase ? phase + ": " : ""}${msg}\n`;
        logEl.scrollTop = logEl.scrollHeight;
      }
      function showError(msg) {
        errorEl.textContent = "无法启动 Vantaloom：" + msg;
        errorEl.classList.add("show");
        actions.classList.add("show");
        setStatus("启动失败");
        setProgress(0);
        bar.classList.remove("indeterminate");
        appendLog("error", msg);
      }
      function clearError() {
        errorEl.classList.remove("show");
        actions.classList.remove("show");
      }

      // Resolve once the Wails runtime + bindings are injected.
      function waitForWails(timeoutMs = 8000) {
        return new Promise((resolve, reject) => {
          const start = Date.now();
          (function poll() {
            if (window.runtime && window.go && window.go.main && window.go.main.App) {
              return resolve();
            }
            if (Date.now() - start > timeoutMs) {
              return reject(new Error("桌面运行环境未就绪（window.go 不可用）"));
            }
            setTimeout(poll, 60);
          })();
        });
      }

      async function boot() {
        clearError();
        setStatus("正在检测本机 Vantaloom…");
        setProgress(-1); // indeterminate until first progress event
        try {
          await waitForWails();
        } catch (e) {
          // Opened outside the desktop shell (e.g. a plain browser) — nothing to do.
          showError(e.message);
          return;
        }
        try {
          targetURL = await window.go.main.App.Bootstrap();
          setStatus("就绪，正在进入…");
          setProgress(100);
          // Hand the webview off to the live local app (same-origin localhost).
          window.location.replace(targetURL);
        } catch (e) {
          showError((e && e.message) ? e.message : String(e));
        }
      }

      // Live progress from the Go backend bootstrap.
      function subscribe() {
        if (!window.runtime || !window.runtime.EventsOn) return;
        window.runtime.EventsOn("vantaloom:boot", (p) => {
          if (!p) return;
          if (p.message) setStatus(p.message);
          if (typeof p.percent === "number") setProgress(p.percent);
          appendLog(p.phase, p.message || "");
        });
      }

      $("retry").addEventListener("click", boot);
      $("browser").addEventListener("click", () => {
        if (targetURL && window.go && window.go.main) {
          window.go.main.App.OpenInBrowser(targetURL);
        }
      });
      $("logToggle").addEventListener("click", () => {
        const open = logEl.classList.toggle("show");
        $("logToggle").textContent = open ? "隐藏详细日志" : "显示详细日志";
      });

      // Wails injects bindings before the page is interactive, but subscribe as
      // soon as possible and kick off the boot sequence.
      waitForWails().then(subscribe).catch(() => {});
      window.addEventListener("DOMContentLoaded", boot);
    </script>
  </body>
</html>
