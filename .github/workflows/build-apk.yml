name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write # tag + create a release and upload the APK as a permanent asset
    env:
      # arm64 covers essentially every real phone; add more targets later.
      TAURI_ANDROID_TARGET: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc + build tools (EasyTier build deps)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler build-essential

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Rust (+ android target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK + platform
        run: |
          NDK_VER=26.0.10792818
          sdkmanager "ndk;$NDK_VER" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          NDK_DIR="$ANDROID_SDK_ROOT/ndk/$NDK_VER"
          echo "NDK_HOME=$NDK_DIR" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$NDK_DIR" >> "$GITHUB_ENV"
          # KEY FIX: prepend the NDK LLVM toolchain to PATH so the `cc` crate and
          # bindgen use the Android clang (with its built-in sysroot) instead of
          # host clang. Without this, kcp-sys's bindgen reads host /usr/include
          # and dies on bits/libc-header-start.h. (Matches EasyTier mobile.yml.)
          echo "$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Install Tauri CLI
        uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall -y tauri-cli@^2.0

      - name: Tauri Android init (generates src-tauri/gen/android)
        run: cargo tauri android init --skip-targets-install

      - name: Generate app icons (real Vantaloom icon → all densities/mipmaps)
        run: cargo tauri icon app-icon.png

      - name: Allow cleartext HTTP (Hub + mesh runtimes are http://)
        run: |
          set -euo pipefail
          MAIN=src-tauri/gen/android/app/src/main
          MANIFEST="$MAIN/AndroidManifest.xml"
          # A network security config DEFINITIVELY permits cleartext, overriding
          # the release-mode `usesCleartextTraffic=false` that Tauri injects via
          # the ${usesCleartextTraffic} manifest placeholder.
          mkdir -p "$MAIN/res/xml"
          {
            echo '<?xml version="1.0" encoding="utf-8"?>'
            echo '<network-security-config>'
            echo '    <base-config cleartextTrafficPermitted="true" />'
            echo '</network-security-config>'
          } > "$MAIN/res/xml/network_security_config.xml"
          # Reference the config + force the attribute true (idempotent; covers
          # both the placeholder form and a missing attribute).
          grep -q 'networkSecurityConfig' "$MANIFEST" || \
            sed -i 's|<application|<application android:networkSecurityConfig="@xml/network_security_config"|' "$MANIFEST"
          sed -i 's|android:usesCleartextTraffic="[^"]*"|android:usesCleartextTraffic="true"|' "$MANIFEST"
          grep -q 'usesCleartextTraffic="true"' "$MANIFEST" || \
            sed -i 's|<application|<application android:usesCleartextTraffic="true"|' "$MANIFEST"
          echo "=== AndroidManifest <application> tag ==="
          sed -n '/<application/,/>/p' "$MANIFEST"

      - name: Register VpnService + dump Android wiring (debug)
        run: |
          set -euo pipefail
          MANIFEST=src-tauri/gen/android/app/src/main/AndroidManifest.xml
          # The plugin ships the Kotlin VpnService class but NOT a manifest <service>
          # entry. Declare it — without this Android never lists the app as a VPN app
          # and VpnService.prepare() shows no consent dialog (the bug we're chasing).
          SVC='<service android:name="com.plugin.vpnservice.TauriVpnService" android:enabled="true" android:exported="false" android:permission="android.permission.BIND_VPN_SERVICE"><intent-filter><action android:name="android.net.VpnService" /></intent-filter></service>'
          grep -q 'TauriVpnService' "$MANIFEST" || sed -i "s|</application>|${SVC}</application>|" "$MANIFEST"
          echo "=== <service> declarations ==="; grep -o 'android:name="[^"]*Service"' "$MANIFEST" || echo "(none)"
          echo "=== full AndroidManifest.xml ==="; cat "$MANIFEST"
          echo "=== tauri.settings.gradle (are plugin android modules linked?) ==="
          cat src-tauri/gen/android/tauri.settings.gradle 2>/dev/null || echo "(no tauri.settings.gradle)"
          echo "=== app/build.gradle.kts plugin refs ==="
          grep -iE 'vpnservice|tauri|implementation|project\(' src-tauri/gen/android/app/build.gradle.kts 2>/dev/null | head -40 || true

      - name: Build APK (release — stripped, size-optimized)
        run: cargo tauri android build --apk --target ${{ env.TAURI_ANDROID_TARGET }}

      - name: Use the committed stable signing keystore
        run: |
          set -euo pipefail
          # A FIXED keystore (committed in signing/) gives every build the SAME
          # signature, so the app updates in place instead of failing with a
          # "signatures do not match" error from a fresh per-build key.
          mkdir -p "$HOME/.android"
          cp signing/vantaloom.keystore "$HOME/.android/debug.keystore"
          echo "Using committed stable keystore (alias androiddebugkey)."

      - name: Sign release APK with debug keystore
        run: |
          set -euo pipefail
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/34.0.0"
          ZIPALIGN="$BUILD_TOOLS/zipalign"
          APKSIGNER="$BUILD_TOOLS/apksigner"
          echo "Using build-tools at: $BUILD_TOOLS"
          ls -la "$BUILD_TOOLS" || true

          # Locate the unsigned release APK (universal or arm64-v8a, name varies).
          UNSIGNED="$(find src-tauri/gen/android/app/build/outputs -name '*-release-unsigned.apk' | head -n1)"
          if [ -z "$UNSIGNED" ]; then
            echo "ERROR: no *-release-unsigned.apk found under build outputs:"
            find src-tauri/gen/android/app/build/outputs -name '*.apk' || true
            exit 1
          fi
          echo "Unsigned release APK: $UNSIGNED"

          ALIGNED="${UNSIGNED%-unsigned.apk}-aligned.apk"
          "$ZIPALIGN" -f -p 4 "$UNSIGNED" "$ALIGNED"

          # apksigner writes the signature in place on the aligned APK.
          "$APKSIGNER" sign \
            --ks "$HOME/.android/debug.keystore" \
            --ks-pass pass:android \
            --ks-key-alias androiddebugkey \
            --key-pass pass:android \
            "$ALIGNED"

          # Surface scheme info; don't let a benign v1-compat warning fail the job.
          "$APKSIGNER" verify --verbose "$ALIGNED" || true
          echo "SIGNED_APK=$ALIGNED" >> "$GITHUB_ENV"
          echo "Signed release APK: $ALIGNED"

      - name: Collect APK (uniquely named per build)
        run: |
          set -euo pipefail
          mkdir -p dist
          # The signed release APK; never the unsigned/intermediate ones.
          APK="$(find src-tauri/gen/android -name '*-release-aligned.apk' | head -n1)"
          if [ -z "$APK" ]; then
            echo "ERROR: no signed APK found:"; find src-tauri/gen/android -name '*.apk' || true; exit 1
          fi
          SHA="$(git rev-parse --short HEAD)"
          # Stamp build number + commit into the filename so every build is a
          # distinct file (the phone's transfer app dedupes by name otherwise).
          NAME="vantaloom-build${GITHUB_RUN_NUMBER}-${SHA}.apk"
          cp "$APK" "dist/$NAME"
          echo "Collected: dist/$NAME"; ls -la dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vantaloom-android-apk
          path: dist/*.apk
          if-no-files-found: error

      - name: Publish APK to a GitHub Release (permanent download)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # A fresh tag + Release per build so the signed APK is a PERMANENT
          # download (Actions artifacts expire after a few weeks). The committed
          # stable keystore means every build shares a signature, so the APK
          # installs in place over the previous one (no uninstall needed).
          SHA="$(git rev-parse --short HEAD)"
          TAG="apk-build${GITHUB_RUN_NUMBER}-${SHA}"
          APK="$(find dist -name '*.apk' | head -n1)"
          if [ -z "$APK" ]; then echo "ERROR: no APK to release"; exit 1; fi
          gh release create "$TAG" "$APK" \
            --title "Vantaloom Android · build ${GITHUB_RUN_NUMBER} (${SHA})" \
            --notes "Automated APK from ${SHA}. Install over any previous build (shared signing key — no uninstall needed)." \
            --latest
          echo "Released $TAG → $(basename "$APK")"
