name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "mobile-src/**"
      - "web/**"
      - ".github/workflows/build-apk.yml"
      - ".github/scripts/**"
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    # No native language runtimes are compiled anymore (0.14.33): the on-device
    # Linux sandbox uses a precompiled proot + a rootfs downloaded on first use,
    # so this job is just gomobile bind + web staging + Gradle + signing.
    timeout-minutes: 45
    permissions:
      contents: write # tag + create a release and upload the APK as a permanent asset
    env:
      # arm64 covers essentially every real phone.
      GOMOBILE_TARGET: android/arm64
      ANDROID_API: "24"
      NDK_VER: "26.0.10792818"
      X_MOBILE_VERSION: "v0.0.0-20260709172247-6129f5bee9d5"
      AAR_OUT: android/app/libs/loomnet.aar
      # Precompiled proot sandbox kernel (Termux upstream, pinned by SHA256).
      # These run the downloaded Linux rootfs without root; see runtime-engines
      # is gone, sandbox is proot + Ubuntu Base pulled at runtime.
      PROOT_DEB_URL: "https://packages.termux.dev/apt/termux-main/pool/main/p/proot/proot_5.1.107.85_aarch64.deb"
      PROOT_DEB_SHA256: "103e210d9e2ddc2b7b18147753dafccc775470ec88204f96a080534b36da261f"
      TALLOC_DEB_URL: "https://packages.termux.dev/apt/termux-main/pool/main/libt/libtalloc/libtalloc_2.4.3_aarch64.deb"
      TALLOC_DEB_SHA256: "ac81ad623d74c209718b9f3acb2dd702cc8a88c431e820d212229910b4db29da"
      SHMEM_DEB_URL: "https://packages.termux.dev/apt/termux-main/pool/main/liba/libandroid-shmem/libandroid-shmem_0.7_aarch64.deb"
      SHMEM_DEB_SHA256: "0da3a24d558b93c92bcf8d611e0826a99ff96e396b148e6cdf33b47c47c57ff6"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: |
            mobile-src/go.sum

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK + platform + build-tools
        run: |
          set -euo pipefail
          sdkmanager "ndk;${NDK_VER}" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          NDK_DIR="$ANDROID_SDK_ROOT/ndk/${NDK_VER}"
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$NDK_DIR" >> "$GITHUB_ENV"

      - name: Install packaging prerequisites
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y patchelf unzip

      - name: Test the WebView bridge contract
        run: node --test android/app/src/test/js/bridge-shim.test.mjs

      - name: Stage the proot sandbox kernel into jniLibs
        run: |
          set -euo pipefail
          JNI="android/app/src/main/jniLibs/arm64-v8a"
          mkdir -p "$JNI"
          WORK="$RUNNER_TEMP/proot-stage"
          mkdir -p "$WORK"

          fetch_deb() {
            local url="$1" sha="$2" out="$3"
            curl -fsSL --retry 3 --retry-delay 2 -o "$out" "$url"
            echo "$sha  $out" | sha256sum -c -
          }
          extract_deb_data() {
            # deb = ar(debian-binary, control.tar.*, data.tar.*); unpack data.
            local deb="$1" dest="$2"
            mkdir -p "$dest"
            ( cd "$dest" && ar x "$deb" && tar -xf data.tar.* )
          }

          fetch_deb "$PROOT_DEB_URL" "$PROOT_DEB_SHA256" "$WORK/proot.deb"
          fetch_deb "$TALLOC_DEB_URL" "$TALLOC_DEB_SHA256" "$WORK/talloc.deb"
          fetch_deb "$SHMEM_DEB_URL" "$SHMEM_DEB_SHA256" "$WORK/shmem.deb"
          extract_deb_data "$WORK/proot.deb" "$WORK/proot"
          extract_deb_data "$WORK/talloc.deb" "$WORK/talloc"
          extract_deb_data "$WORK/shmem.deb" "$WORK/shmem"

          PREFIX="data/data/com.termux/files/usr"
          cp "$WORK/proot/$PREFIX/bin/proot"               "$JNI/libproot.so"
          cp "$WORK/proot/$PREFIX/libexec/proot/loader"    "$JNI/libproot_loader.so"
          cp "$WORK/proot/$PREFIX/libexec/proot/loader32"  "$JNI/libproot_loader32.so"
          cp "$WORK/talloc/$PREFIX/lib/libtalloc.so.2.4.3" "$JNI/libtalloc.so"
          cp "$WORK/shmem/$PREFIX/lib/libandroid-shmem.so" "$JNI/libandroid_shmem.so"
          chmod 0755 "$JNI"/libproot*.so "$JNI"/libtalloc.so "$JNI"/libandroid_shmem.so

          # The Termux proot links its deps by versioned/dashed sonames and an
          # $PREFIX rpath that does not exist off-Termux. Repoint the DT_NEEDED
          # to the extractable lib*.so names and search $ORIGIN (nativeLibraryDir);
          # libc.so is resolved by the system linker. The runtime sets
          # PROOT_LOADER to the staged loader so proot never needs $PREFIX.
          patchelf --replace-needed libtalloc.so.2 libtalloc.so "$JNI/libproot.so"
          patchelf --replace-needed libandroid-shmem.so libandroid_shmem.so "$JNI/libproot.so"
          patchelf --set-rpath '$ORIGIN' "$JNI/libproot.so"
          echo "Staged proot sandbox kernel:"
          ls -la "$JNI"

      - name: Install gomobile + gobind
        run: |
          set -euo pipefail
          go install "golang.org/x/mobile/cmd/gomobile@${X_MOBILE_VERSION}"
          go install "golang.org/x/mobile/cmd/gobind@${X_MOBILE_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: gomobile init
        run: gomobile init

      - name: Bind the loomnet overlay facade → AAR
        timeout-minutes: 20
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$AAR_OUT")"
          pushd mobile-src
          go get "golang.org/x/mobile/bind@${X_MOBILE_VERSION}"
          gomobile bind \
            -target="${GOMOBILE_TARGET}" \
            -androidapi "${ANDROID_API}" \
            -javapkg=online.timefiles \
            -o "${GITHUB_WORKSPACE}/${AAR_OUT}" \
            ./mobile
          popd
          ls -la "$AAR_OUT"

      - name: Stage the compiled web export into app assets
        run: |
          set -euo pipefail
          if [ ! -f web/index.html ]; then
            echo "ERROR: web/ export missing (expected the committed Next.js export)"; exit 1
          fi
          forbidden_web_files="$(find web -type f \( -name '*.map' -o -name '*.ts' -o -name '*.tsx' -o -name '*.jsx' \) -print)"
          if [ -n "$forbidden_web_files" ]; then
            echo "ERROR: public web bundle contains source/sourcemap files:" >&2
            printf '%s\n' "$forbidden_web_files" >&2
            exit 1
          fi
          mkdir -p android/app/src/main/assets
          rm -f android/app/src/main/assets/README.md
          cp -r web/. android/app/src/main/assets/
          echo "Staged $(find android/app/src/main/assets -type f | wc -l) web files."

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Test Android native runtime contracts
        working-directory: android
        run: gradle :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Assemble release APK (unsigned)
        working-directory: android
        timeout-minutes: 30
        run: |
          set -euo pipefail
          gradle :app:assembleRelease --no-daemon --stacktrace \
            -PversionCode="${GITHUB_RUN_NUMBER}"

      - name: Assert the web bundle survived AAPT (assets/_next present)
        run: |
          set -euo pipefail
          # AAPT's default ignore pattern drops `_*` asset DIRECTORIES — with it,
          # index.html ships but every /_next/ chunk 404s and the app freezes on
          # the prerendered spinner (build136 regression). build.gradle.kts
          # overrides ignoreAssetsPattern; this step makes any regression fail
          # the build loudly instead of shipping a bricked APK.
          APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          NEXT_COUNT="$(unzip -l "$APK" | grep -c 'assets/_next/' || true)"
          TOTAL_ASSETS="$(unzip -l "$APK" | grep -c 'assets/' || true)"
          echo "assets entries: $TOTAL_ASSETS, assets/_next entries: $NEXT_COUNT"
          if [ "$NEXT_COUNT" -lt 10 ]; then
            echo "ERROR: assets/_next/ missing or nearly empty ($NEXT_COUNT entries) — the web JS bundle did not make it into the APK."
            exit 1
          fi

      - name: Assert native binaries survived APK packaging
        run: |
          set -euo pipefail
          APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          APK_ENTRIES="$RUNNER_TEMP/vantaloom-apk-entries.txt"
          unzip -Z1 "$APK" > "$APK_ENTRIES"
          for entry in \
            lib/arm64-v8a/libvantaloom.so \
            lib/arm64-v8a/libgojni.so \
            lib/arm64-v8a/libproot.so \
            lib/arm64-v8a/libproot_loader.so \
            lib/arm64-v8a/libtalloc.so \
            lib/arm64-v8a/libandroid_shmem.so; do
            if ! grep -Fxq "$entry" "$APK_ENTRIES"; then
              echo "ERROR: required native entry is missing from APK: $entry"
              exit 1
            fi
          done
          echo "All required native binaries are present in the APK."

      - name: Sign release APK (keystore from GitHub secrets)
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${SIGNING_KEYSTORE_BASE64:-}" ]; then
            echo "ERROR: SIGNING_KEYSTORE_BASE64 secret is not set. See signing/README.md."; exit 1
          fi
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/34.0.0"
          KS="$RUNNER_TEMP/release.jks"
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$KS"

          UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ ! -f "$UNSIGNED" ]; then
            echo "ERROR: unsigned release APK not found:"; find android/app/build/outputs -name '*.apk' || true; exit 1
          fi

          ALIGNED="$RUNNER_TEMP/vantaloom-release-aligned.apk"
          "$BUILD_TOOLS/zipalign" -f -p 4 "$UNSIGNED" "$ALIGNED"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$KS" \
            --ks-pass "pass:${SIGNING_KEYSTORE_PASSWORD}" \
            --ks-key-alias "${SIGNING_KEY_ALIAS}" \
            --key-pass "pass:${SIGNING_KEY_PASSWORD}" \
            "$ALIGNED"
          "$BUILD_TOOLS/zipalign" -c -v 4 "$ALIGNED"
          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs "$ALIGNED"

          mkdir -p dist
          SHA="$(git rev-parse --short HEAD)"
          NAME="vantaloom-build${GITHUB_RUN_NUMBER}-${SHA}.apk"
          cp "$ALIGNED" "dist/$NAME"
          echo "APK_NAME=$NAME" >> "$GITHUB_ENV"
          echo "Signed: dist/$NAME"; ls -la dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vantaloom-android-apk
          path: dist/*.apk
          if-no-files-found: error

      - name: Publish APK to a GitHub Release (permanent download)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHA="$(git rev-parse --short HEAD)"
          TAG="apk-build${GITHUB_RUN_NUMBER}-${SHA}"
          APK="dist/${APK_NAME}"
          gh release create "$TAG" "$APK" \
            --target "$GITHUB_SHA" \
            --title "Vantaloom Android · build ${GITHUB_RUN_NUMBER} (${SHA})" \
            --notes "Vantaloom 0.14.33 Android local-first client. The on-device agent shell now runs inside a real Debian-family Linux sandbox (proot + a rootfs downloaded on first use): apt/pip/git/compilers all work. Signed with the stable project release key for in-place upgrades." \
            --latest
          echo "Released $TAG → $(basename "$APK")"
