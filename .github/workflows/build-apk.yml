name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      # arm64 covers essentially every real phone; add more targets later.
      TAURI_ANDROID_TARGET: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc (EasyTier build dependency)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Rust (+ android target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK + platform
        run: |
          sdkmanager "ndk;26.1.10909125" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Install Tauri CLI
        uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall -y tauri-cli@^2.0

      - name: Tauri Android init (generates src-tauri/gen/android)
        run: cargo tauri android init --skip-targets-install

      - name: Build APK (debug — debug-signed and installable)
        run: cargo tauri android build --debug --apk --target ${{ env.TAURI_ANDROID_TARGET }}

      - name: Collect APKs
        run: |
          mkdir -p dist
          find src-tauri/gen/android -name '*.apk' -exec cp {} dist/ \;
          echo "Built APKs:"; ls -la dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vantaloom-android-apk
          path: dist/*.apk
          if-no-files-found: error
